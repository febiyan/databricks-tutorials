# ────────────────────── Pipeline resource definition ──────────────────────
# This file defines the Lakeflow Spark Declarative Pipeline resource
# for the Declarative Automation Bundle.

resources:
  pipelines:
    customers_hashed:
      name: "customers_hashed"
      catalog: ${var.catalog}
      target: ${var.schema}
      libraries:
        - file:
            path: ./src/privacy_pipeline.py
        - file:
            path: ./src/pii_utils.py
      channel: CURRENT
      continuous: false
      development: true
      photon: true

  jobs:
    customers_hashed_job:
      name: "customers_hashed_job"
      schedule:
        # For simplicity, we schedule this at 8 am
        quartz_cron_expression: "0 0 8 * * ?"  
        timezone_id: UTC
      tasks:
        # Simply refresh the pipeline (depends on tests passing)
        - task_key: refresh_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.customers_hashed.id}
            full_refresh: false
